<!DOCTYPE html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebrities &mdash; PictoPlex</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="nav-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>Search movies, actors, directors&hellip;</span>
  </div>
  <div class="nav-links">

    <a href="celebrities.html" class="nav-link active">Celebrities</a>
  </div>
</nav>

<div class="page-header">
  <div>
    <div class="page-header-eyebrow">Discover</div>
    <div class="page-header-title">Actors <span>&amp;</span> Directors</div>
    <div class="page-header-sub">Browse the people behind your favourite films</div>
  </div>
  <div class="search-dark">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <span>Search by name&hellip;</span>
  </div>
</div>

<div class="tabs-wrapper" style="background:#fff">
  <div class="tabs">
    <button class="tab active" data-tab="tab-all">All</button>
    <button class="tab" data-tab="tab-actors">Actors</button>
    <button class="tab" data-tab="tab-directors">Directors</button>
  </div>
</div>

<div style="background:var(--cream2);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
  <select class="sort-select">
    <option>Sort: Most popular</option>
    <option>Sort: Name A&ndash;Z</option>
    <option>Sort: Most films</option>
  </select>
  <select class="sort-select">
    <option>Genre: All</option>
    <option>Genre: Action</option>
    <option>Genre: Drama</option>
    <option>Genre: Sci-Fi</option>
    <option>Genre: Comedy</option>
  </select>
</div>

<div class="container">
  <div id="tab-all" class="tab-content active">

    <section class="reveal">
      <div class="section-hdr">
        <h2 class="section-title">Popular <span>actors</span></h2>
        <a href="#" class="section-link">See all &rarr;</a>
      </div>
      <div class="celeb-grid"></div>
    </section>

    <div class="divider"></div>

    <section class="reveal">
      <div class="section-hdr">
        <h2 class="section-title">Popular <span>directors</span></h2>
        <a href="#" class="section-link">See all &rarr;</a>
      </div>
      <div class="celeb-grid"></div>
    </section>

    <div class="divider"></div>

    <section class="reveal">
      <div class="section-hdr">
        <h2 class="section-title">Most <span>popular this week</span></h2>
      </div>
      <div class="pop-chart"></div>
    </section>

  </div>
</div>

<footer>
  <a href="index.html" class="footer-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>

    <a href="browse.html" class="footer-link">Browse</a>
    <a href="#" class="footer-link">Privacy</a>
  </div>
  <div class="footer-copy">&copy; 2024 PictoPlex</div>
