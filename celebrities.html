<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celebrities — PictoPlex</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="nav-search-wrap">
    <svg class="nav-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="nav-search-input" class="nav-search-input" type="text" placeholder="Search movies, actors, directors…">
    <div id="nav-search-results" class="nav-search-results"></div>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link">Movies</a>
    <a href="celebrities.html" class="nav-link">Celebrities</a>
  </div>
</nav>

<div class="page-header">
  <div>
    <div class="page-header-eyebrow">Discover</div>
    <div class="page-header-title">Actors <span>&</span> Directors</div>
    <div class="page-header-sub">Browse the people behind your favourite films</div>
  </div>
  <div class="search-dark-wrap">
    <svg class="search-dark-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-dark-input" type="text" placeholder="Search by name… (press Enter)">
  </div>
</div>

<div style="background:#fff">
  <div class="tabs">
    <button class="tab active" data-tab="tab-all">All</button>
    <button class="tab" data-tab="tab-actors-tab">Actors</button>
    <button class="tab" data-tab="tab-directors-tab">Directors</button>
  </div>
</div>

<div style="background:var(--cream2);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
  <select class="sort-select">
    <option>Sort: Most popular</option>
    <option>Sort: Name A–Z</option>
    <option>Sort: Most films</option>
  </select>
</div>

<div id="tab-all" class="tab-content active">
  <div class="container">
    <section class="reveal">
      <div class="section-hdr">
        <h2 class="section-title">Popular <span>actors</span></h2>
      <a href="all-actors.html" class="section-link">See all →</a>
      </div>
      <div class="celeb-grid"><!-- Filled by script.js --></div>
    </section>
    <div class="divider"></div>
    <section class="reveal">
      <div class="section-hdr">
        <h2 class="section-title">Popular <span>directors</span></h2>
        <a href="all-directors.html" class="section-link">See all →</a>
      </div>
      <div class="celeb-grid"><!-- Filled by script.js --></div>
    </section>
    <div class="divider"></div>
    <section class="reveal" style="padding-bottom:48px">
      <div class="section-hdr"><h2 class="section-title">Most <span>popular this week</span></h2></div>
      <div class="pop-chart"><!-- Filled by script.js --></div>
    </section>
  </div>
</div>

<div id="tab-actors-tab" class="tab-content">
  <div class="container">
    <section style="padding-bottom:48px">
      <div class="celeb-grid" id="actors-only-grid" style="margin-top:28px">
        <div class="loading"></div>
      </div>
    </section>
  </div>
</div>

<div id="tab-directors-tab" class="tab-content">
  <div class="container">
    <section style="padding-bottom:48px">
      <div class="celeb-grid" id="directors-only-grid" style="margin-top:28px">
        <div class="loading"></div>
      </div>
    </section>
  </div>
</div>

<footer>
  <a href="index.html" class="footer-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="footer-links">
    <a href="index.html" class="footer-link">Home</a>
    <a href="browse.html" class="footer-link">Browse</a>
    <a href="celebrities.html" class="footer-link">Celebrities</a>
  </div>
  <div class="footer-copy">© 2024 PictoPlex</div>
</footer>

<script src="script.js"></script>
</body>
</html>
