<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Actors — PictoPlex</title>
<link rel="stylesheet" href="style.css">
<style>
  .actors-header {
    background: linear-gradient(120deg, #0f1623, #2e3d58);
    padding: 48px 32px;
    text-align: center;
  }
  
  .actors-header h1 {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 12px;
  }
  
  .actors-header h1 span {
    color: var(--blue);
  }
  
  .actors-header p {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
  }
  
  .actors-stats {
    background: #fff;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  
  .total-count {
    font-size: 14px;
    color: var(--muted);
  }
  
  .total-count strong {
    color: var(--blue);
    font-size: 18px;
  }
  
  .search-actor {
    display: flex;
    gap: 10px;
  }
  
  .search-actor input {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    width: 250px;
    font-family: var(--font-body);
  }
  
  .actors-grid-large {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 24px;
    padding: 32px;
    background: var(--cream);
  }
  
  .actor-card-large {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }
  
  .actor-card-large:hover {
    transform: translateY(-5px);
    border-color: var(--blue);
    box-shadow: 0 8px 20px rgba(40,120,212,0.15);
  }
  
  .actor-avatar-large {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--blue3), var(--blue4));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-weight: bold;
    color: var(--blue2);
  }
  
  .actor-info-large {
    padding: 16px;
  }
  
  .actor-name-large {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  
  .actor-films {
    font-size: 12px;
    color: var(--muted);
  }
  
  .loading-more {
    text-align: center;
    padding: 40px;
    grid-column: 1 / -1;
  }
  
  @media (max-width: 768px) {
    .actors-grid-large {
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      padding: 20px;
    }
    
    .actors-header h1 {
      font-size: 32px;
    }
    
    .actors-stats {
      flex-direction: column;
      align-items: stretch;
    }
    
    .search-actor input {
      width: 100%;
    }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="nav-search-wrap">
    <svg class="nav-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="nav-search-input" class="nav-search-input" type="text" placeholder="Search movies, actors, directors…">
    <div id="nav-search-results" class="nav-search-results"></div>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link">Movies</a>
    <a href="celebrities.html" class="nav-link">Celebrities</a>
  </div>
</nav>

<div class="actors-header">
  <h1>All <span>Actors</span></h1>
  <p>Discover every actor in the PictoPlex database</p>
</div>

<div class="actors-stats">
  <div class="total-count">
    Total <strong id="total-actors">0</strong> actors
  </div>
  <div class="search-actor">
    <input type="text" id="actor-search" placeholder="Search actors by name...">
    <button class="btn btn-dark" id="search-btn">Search</button>
  </div>
</div>

<div id="actors-grid" class="actors-grid-large">
  <div class="loading"></div>
</div>

<div class="pagination-container" style="display: flex; justify-content: center; align-items: center; gap: 20px; padding: 30px 20px; flex-wrap: wrap;">
  <button id="first-page" class="btn btn-outline" disabled>« First</button>
  <button id="prev-page" class="btn btn-outline" disabled>‹ Prev</button>
  <div id="page-numbers" class="page-numbers" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
  <button id="next-page" class="btn btn-outline">Next ›</button>
  <button id="last-page" class="btn btn-outline">Last »</button>
</div>

<footer>
  <a href="index.html" class="footer-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="footer-links">
    <a href="index.html" class="footer-link">Home</a>
    <a href="browse.html" class="footer-link">Browse</a>
    <a href="celebrities.html" class="footer-link">Celebrities</a>
  </div>
  <div class="footer-copy">© 2024 PictoPlex</div>
</footer>

<script src="script.js"></script>
<script>
let currentPage = 1;
let totalPages = 1;
let allActors = [];
let currentSearch = '';
const ITEMS_PER_PAGE = 24;

// Fetch all actors from the API
async function fetchAllActors() {
  try {
    console.log('Fetching all actors...');
    // First, get total count
    const data = await fetchAPI('/celebrities?type=actor&limit=1000');
    allActors = data.actors || [];
    console.log(`Found ${allActors.length} actors`);
    
    const totalActorsEl = document.getElementById('total-actors');
    if (totalActorsEl) totalActorsEl.textContent = allActors.length.toLocaleString();
    
    totalPages = Math.ceil(allActors.length / ITEMS_PER_PAGE);
    return allActors;
  } catch (error) {
    console.error('Error fetching actors:', error);
    return [];
  }
}

// Render actors for current page
function renderActorsPage(page) {
  const grid = document.getElementById('actors-grid');
  if (!grid) return;
  
  let actorsToShow = allActors;
  
  // Apply search filter
  if (currentSearch) {
    actorsToShow = allActors.filter(actor => 
      actor.name.toLowerCase().includes(currentSearch.toLowerCase())
    );
    
    const totalActorsEl = document.getElementById('total-actors');
    if (totalActorsEl) totalActorsEl.textContent = actorsToShow.length.toLocaleString();
    
    totalPages = Math.ceil(actorsToShow.length / ITEMS_PER_PAGE);
  }
  
  if (actorsToShow.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No actors found</h3><p>Try a different search term.</p></div>';
    return;
  }
  
  // Calculate start and end indices
  const start = (page - 1) * ITEMS_PER_PAGE;
  const end = Math.min(start + ITEMS_PER_PAGE, actorsToShow.length);
  const pageActors = actorsToShow.slice(start, end);
  
  const colors = ['pc1', 'pc2', 'pc3', 'pc4', 'pc5', 'pc6'];
  
  grid.innerHTML = pageActors.map((actor, i) => `
    <div class="actor-card-large" onclick="location.href='celebrity-detail.html?id=${actor.person_id}'">
      <div class="actor-avatar-large ${colors[i % colors.length]}">
        ${initials(actor.name)}
      </div>
      <div class="actor-info-large">
        <div class="actor-name-large">${actor.name}</div>
        <div class="actor-films">${actor.film_count || 0} films</div>
      </div>
    </div>
  `).join('');
  
  // Update pagination
  updatePaginationControls(actorsToShow.length);
}

function updatePaginationControls(totalItems) {
  const firstBtn = document.getElementById('first-page');
  const prevBtn = document.getElementById('prev-page');
  const nextBtn = document.getElementById('next-page');
  const lastBtn = document.getElementById('last-page');
  const pageNumbersDiv = document.getElementById('page-numbers');
  
  const total = totalItems;
  totalPages = Math.ceil(total / ITEMS_PER_PAGE);
  
  // Update button states
  if (firstBtn) firstBtn.disabled = currentPage === 1;
  if (prevBtn) prevBtn.disabled = currentPage === 1;
  if (nextBtn) nextBtn.disabled = currentPage === totalPages;
  if (lastBtn) lastBtn.disabled = currentPage === totalPages;
  
  // Set button actions
  if (firstBtn) firstBtn.onclick = () => currentPage !== 1 && goToPage(1);
  if (prevBtn) prevBtn.onclick = () => currentPage > 1 && goToPage(currentPage - 1);
  if (nextBtn) nextBtn.onclick = () => currentPage < totalPages && goToPage(currentPage + 1);
  if (lastBtn) lastBtn.onclick = () => currentPage !== totalPages && goToPage(totalPages);
  
  // Generate page numbers
  if (pageNumbersDiv && totalPages > 0) {
    const maxVisible = 7;
    let start = Math.max(1, currentPage - Math.floor(maxVisible / 2));
    let end = Math.min(totalPages, start + maxVisible - 1);
    
    if (end - start + 1 < maxVisible) {
      start = Math.max(1, end - maxVisible + 1);
    }
    
    let html = '';
    if (start > 1) {
      html += `<div class="page-number" data-page="1">1</div>`;
      if (start > 2) html += `<div class="page-number dots">...</div>`;
    }
    
    for (let i = start; i <= end; i++) {
      html += `<div class="page-number ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</div>`;
    }
    
    if (end < totalPages) {
      if (end < totalPages - 1) html += `<div class="page-number dots">...</div>`;
      html += `<div class="page-number" data-page="${totalPages}">${totalPages}</div>`;
    }
    
    pageNumbersDiv.innerHTML = html;
    
    // Add click handlers
    document.querySelectorAll('.page-number[data-page]').forEach(el => {
      el.addEventListener('click', () => {
        const page = parseInt(el.dataset.page);
        if (page !== currentPage) goToPage(page);
      });
    });
  }
}

function goToPage(page) {
  currentPage = page;
  renderActorsPage(currentPage);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function searchActors() {
  const searchInput = document.getElementById('actor-search');
  currentSearch = searchInput.value.trim();
  currentPage = 1;
  renderActorsPage(1);
}

// Initialize
document.addEventListener('DOMContentLoaded', async () => {
  initNavSearch();
  setActiveNav();
  
  // Fetch all actors first
  await fetchAllActors();
  
  // Render first page
  renderActorsPage(1);
  
  // Setup search
  const searchInput = document.getElementById('actor-search');
  const searchBtn = document.getElementById('search-btn');
  
  if (searchBtn) {
    searchBtn.addEventListener('click', searchActors);
  }
  
  if (searchInput) {
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchActors();
      }
    });
  }
});
</script>
</body>
</html>
