<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Movies — PictoPlex</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="nav-search-wrap">
    <svg class="nav-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="nav-search-input" class="nav-search-input" type="text" placeholder="Search movies, actors, directors…">
    <div id="nav-search-results" class="nav-search-results"></div>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="browse.html" class="nav-link">Movies</a>
    <a href="celebrities.html" class="nav-link">Celebrities</a>
  </div>
</nav>

<div class="breadcrumb">
  <a href="index.html">Home</a>
  <span class="breadcrumb-sep">›</span>
  Browse Movies
</div>

<!-- FILTERS -->
<div class="filter-bar">
  <div class="filter-group">
    <span class="filter-label">Year</span>
    <input class="filter-input" id="yearFrom" type="number" placeholder="1900" min="1900" max="2024">
    <span class="filter-sep">to</span>
    <input class="filter-input" id="yearTo" type="number" placeholder="2024" min="1900" max="2024">
  </div>
  <div class="filter-group">
    <span class="filter-label">Budget ($M)</span>
    <input class="filter-input" id="budgetMin" type="number" placeholder="0" min="0">
    <span class="filter-sep">to</span>
    <input class="filter-input" id="budgetMax" type="number" placeholder="any" min="0">
  </div>
  <div class="filter-group">
    <span class="filter-label">Revenue ($M)</span>
    <input class="filter-input" id="revMin" type="number" placeholder="0" min="0">
    <span class="filter-sep">to</span>
    <input class="filter-input" id="revMax" type="number" placeholder="any" min="0">
  </div>
  <button class="filter-btn" onclick="loadBrowseMovies()">Apply filters</button>
  <button class="filter-clear" onclick="clearFilters()">Clear all</button>
</div>

<!-- GENRE PILLS -->
<div class="genre-bar" id="genre-bar">
  <span class="filter-label">Genre</span>
  <!-- Filled by script.js -->
</div>

<!-- RESULTS BAR -->
<div class="results-bar">
  <div class="results-count">Showing <strong>—</strong> films</div>
  <select class="sort-select" id="sort-select">
    <option>Revenue (highest)</option>
    <option>Budget (highest)</option>
    <option>Year (newest)</option>
    <option>Year (oldest)</option>
    <option>Title A–Z</option>
  </select>
</div>

<!-- MOVIE LIST -->
<div class="movie-list" id="movie-list">
  <div class="loading"></div>
</div>

<footer>
  <a href="index.html" class="footer-logo"><span class="p1">PICTO</span><span class="p2">PLEX</span></a>
  <div class="footer-links">
    <a href="index.html" class="footer-link">Home</a>
    <a href="browse.html" class="footer-link">Browse</a>
    <a href="celebrities.html" class="footer-link">Celebrities</a>
  </div>
  <div class="footer-copy">© 2024 PictoPlex</div>
</footer>

<script src="script.js"></script>
<script>
// Override filter inputs to use IDs
function clearFilters() {
  ['yearFrom','yearTo','budgetMin','budgetMax','revMin','revMax'].forEach(id => {
    const el = document.getElementById(id)
    if (el) el.value = ''
  })
  document.querySelectorAll('.genre-pill').forEach(p => p.classList.remove('active'))
  loadBrowseMovies()
}
</script>
<!-- PAGINATION CONTROLS - WITH PAGE NUMBERS -->
<div class="pagination-container">
  <button id="first-page" class="btn btn-outline" disabled>« First</button>
  <button id="prev-page" class="btn btn-outline" disabled>‹ Prev</button>
  <div id="page-numbers" class="page-numbers">
    <!-- Page numbers will be inserted here -->
  </div>
  <button id="next-page" class="btn btn-outline">Next ›</button>
  <button id="last-page" class="btn btn-outline">Last »</button>
</div>
</body>
</html>
